
name: Terraform Validate

on:
  pull_request:
    branches: [main]
    paths:
      - "terraform/**"
  push:
    branches: [main]
    paths:
      - "terraform/**"

env:
  TF_VERSION: "1.7.0"
  TF_WORKING_DIR: terraform

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Terraform Format Check
  # Validates that all .tf files are properly formatted.
  # Developers should run `terraform fmt` locally before committing.
  # ─────────────────────────────────────────────────────────────────────────────
  fmt:
    name: Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Check Terraform formatting
        # -check: exit with non-zero if files would be reformatted
        # -diff:  show a diff of what would change
        # -recursive: check all subdirectories
        run: terraform fmt -check -diff -recursive
        working-directory: ${{ env.TF_WORKING_DIR }}

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Terraform Validate
  # Validates the Terraform configuration syntax and internal consistency.
  # Does NOT require a live cluster — works offline.
  # ─────────────────────────────────────────────────────────────────────────────
  validate:
    name: Validate
    runs-on: ubuntu-latest
    needs: fmt

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        # Initialize providers. Use -backend=false to skip remote state config.
        run: terraform init -backend=false
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Validate
        # Validates provider configs, variable types, and resource references
        run: terraform validate
        working-directory: ${{ env.TF_WORKING_DIR }}

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3: Terraform Security Scan (tfsec)
  # Scans Terraform code for security misconfigurations.
  # Non-blocking in this example (continue-on-error: true).
  # In production, remove continue-on-error to enforce compliance.
  # ─────────────────────────────────────────────────────────────────────────────
  security-scan:
    name: Security Scan (tfsec)
    runs-on: ubuntu-latest
    needs: validate
    continue-on-error: true   # Remove in production to enforce

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          working_directory: ${{ env.TF_WORKING_DIR }}
          soft_fail: true
